<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sujet 3 — Analyse Secteur Aerospace</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════
     NAVBAR
════════════════════════════════════════════════════════════════ -->
<nav class="navbar">
  <div class="navbar-brand">
    <span class="navbar-brand-title">Sujet 3</span>
    <span class="navbar-brand-sub">Séries Temporelles</span>
  </div>
  <div class="navbar-spacer"></div>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
</nav>

<!-- ══════════════════════════════════════════════════════════════
     HERO
════════════════════════════════════════════════════════════════ -->
<div class="container">
  <div class="index-hero">
    <div class="index-hero-tag">Filtre de Hanning</div>
    <h1>Application aux données du secteur <br>Aéronautique</h1>
    <p> Skew-Normal MLE · Kolmogorov-Smirnov breakpoint detection</p>

    <!-- Company selector form -->
    <div class="select-card">
      <form action="/Menu_Liste" method="POST">
        <label class="select-label" for="companySelect">Sélectionner une entreprise</label>
        <select class="select-input" id="companySelect" name="Aerospace">
          {% for ticker, name in societes.items() %}
            <option value="{{ ticker }}">{{ ticker }} — {{ name }}</option>
          {% endfor %}
        </select>
        <button type="submit" class="btn-analyse">Lancer l'analyse →</button>
      </form>
    </div>
  </div>

  <!-- Ticker badge list - centered using inline styles only (no added CSS) -->
  <div style="max-width:520px;margin:2rem auto 4rem; text-align: center;">
    <div style="font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase; color:var(--text-sub);font-family:var(--font-mono);margin-bottom:12px;">
      Entreprises disponibles
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:8px; justify-content: center;">
      {% for ticker, name in societes.items() %}
      <div class="ticker-badge" title="{{ name }}">{{ ticker }}</div>
      {% endfor %}
    </div>
  </div>


</div>



<!-- ── Page script ─────────────────────────────────────────────────────── -->
<script src="{{ url_for('static', filename='js/index.js') }}"></script>

</body>
</html>
